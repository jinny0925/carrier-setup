function renderItems(items){const g={};items.forEach(i=>(g[i.category]??=[]).push(i));$('#cats').innerHTML=Object.entries(g).map(([cat,a])=>{const d=a.filter(x=>x.completed).length;return`<section class="section"><div class="head"><h3>${esc(cat)}</h3><span class="small">${d}/${a.length}</span></div><div class="body"><table><thead><tr><th style="width:45px">완료</th><th style="width:190px">항목</th><th style="width:110px">상태</th><th>배송사 답변</th><th>내부 적용</th><th style="width:105px">담당자</th><th style="width:125px">확인일</th><th>비고/링크</th></tr></thead><tbody>${a.map(i=>`<tr data-id="${i.id}"><td><input type="checkbox" data-f="completed" ${i.completed?'checked':''}></td><td><strong>${esc(i.title)}</strong></td><td><select data-f="status"><option ${i.status==='미확인'?'selected':''}>미확인</option><option ${i.status==='확인 중'?'selected':''}>확인 중</option><option ${i.status==='완료'?'selected':''}>완료</option><option ${i.status==='해당 없음'?'selected':''}>해당 없음</option></select></td><td><textarea data-f="carrierAnswer">${esc(i.carrierAnswer)}</textarea></td><td><textarea data-f="internalNote">${esc(i.internalNote)}</textarea></td><td><input data-f="owner" value="${esc(i.owner)}"></td><td><input type="date" data-f="confirmedDate" value="${esc(i.confirmedDate)}"></td><td><textarea data-f="note">${esc(i.note)}</textarea></td></tr>`).join('')}</tbody></table></div></section>`}).join('');$$('.head').forEach(h=>h.onclick=()=>h.nextElementSibling.classList.toggle('closed'));$$('[data-id] [data-f]').forEach(e=>{const ev=(e.tagName==='TEXTAREA'||e.type==='text')?'input':'change';e.addEventListener(ev,()=>saveItem(e))})}
function saveItem(e){const id=e.closest('[data-id]').dataset.id,f=e.dataset.f,v=e.type==='checkbox'?e.checked:e.value;later(id+f,async()=>{const p={[f]:v,updatedAt:serverTimestamp(),updatedBy:me.email};if(f==='completed')p.status=v?'완료':'미확인';await updateDoc(doc(db,'carriers',cid,'checklistItems',id),p);const rows=$$('[data-id]'),done=rows.filter(r=>r.querySelector('[data-f="completed"]').checked).length;await updateDoc(doc(db,'carriers',cid),{completedItems:done,totalItems:rows.length,updatedAt:serverTimestamp(),updatedBy:me.email});saved()})}
$$('[data-c]').forEach(e=>e.addEventListener('input',()=>{const f=e.dataset.c,v=e.value;if(!cid)return;later('c'+f,async()=>{await updateDoc(doc(db,'carriers',cid),{[f]:v,updatedAt:serverTimestamp(),updatedBy:me.email});saved()})}));$('#addBtn').onclick=()=>$('#modal').classList.remove('hidden');$('#cancel').onclick=()=>$('#modal').classList.add('hidden');$('#create').onclick=async()=>{const name=$('#nName').value.trim();if(!name)return alert('배송사명을 입력하세요.');const r=await addDoc(collection(db,'carriers'),{name,serviceName:$('#nService').value.trim(),origin:$('#nOrigin').value.trim().toUpperCase(),destination:$('#nDest').value.trim().toUpperCase(),owner:$('#nOwner').value.trim(),openDate:$('#nDate').value,projectStatus:'정보 수집',completedItems:0,totalItems:TEMPLATE.length,createdAt:serverTimestamp(),createdBy:me.email,updatedAt:serverTimestamp(),updatedBy:me.email});const b=writeBatch(db);TEMPLATE.forEach((t,i)=>{const x=doc(collection(db,'carriers',r.id,'checklistItems'));b.set(x,{...t,order:i,status:'미확인',completed:false,carrierAnswer:'',internalNote:'',owner:'',confirmedDate:'',note:'',updatedAt:serverTimestamp(),updatedBy:me.email})});await b.commit();$('#modal').classList.add('hidden');openCarrier(r.id)};$('#del').onclick=async()=>{if(!cid||!confirm('삭제할까요?'))return;const s=await getDocs(collection(db,'carriers',cid,'checklistItems'));const chunks=[];let b=writeBatch(db),n=0;for(const d of s.docs){b.delete(d.ref);n++;if(n===450){chunks.push(b.commit());b=writeBatch(db);n=0}}if(n)chunks.push(b.commit());await Promise.all(chunks);await deleteDoc(doc(db,'carriers',cid));cid=null;$('#detail').classList.add('hidden');$('#empty').classList.remove('hidden')};
</script></body></html>
