<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carrier Setup V3</title>
<style>
:root{--bg:#f3f5f8;--card:#fff;--line:#dce2eb;--text:#20252d;--muted:#6b7280;--primary:#2856d8;--soft:#edf2ff;--danger:#c62828;--warn:#b66a00;--ok:#16803c}
*{box-sizing:border-box}body{margin:0;font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}.hidden{display:none!important}
button{cursor:pointer}.primary{background:var(--primary);color:#fff;border:0;border-radius:9px;padding:10px 14px;font-weight:800}.ghost{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 12px}.danger{background:var(--danger);color:#fff;border:0;border-radius:9px;padding:9px 12px}.warn{background:#fff7e8;border:1px solid #ffd28a;color:#8a4b00;border-radius:9px;padding:9px 12px}
.login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(430px,100%);background:#fff;border:1px solid var(--line);border-radius:20px;padding:34px;box-shadow:0 18px 50px rgba(25,40,80,.12);text-align:center}.google-btn{width:100%;margin-top:24px;padding:13px;border:1px solid var(--line);background:#fff;border-radius:10px;font-weight:800}
.topbar{height:68px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:20}.brand{font-weight:900;font-size:20px}.user{display:flex;align-items:center;gap:10px}.user img{width:34px;height:34px;border-radius:50%}.save{font-size:12px;color:var(--muted);min-width:84px;text-align:right}.save.saving{color:var(--warn)}.save.saved{color:var(--ok)}.save.failed{color:var(--danger)}
.layout{display:grid;grid-template-columns:330px 1fr;min-height:calc(100vh - 68px)}.sidebar{background:#fff;border-right:1px solid var(--line);padding:18px;overflow:auto}.main{padding:22px;overflow:auto}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.space{justify-content:space-between}.muted,.small{color:var(--muted)}.small{font-size:12px}
input,select,textarea{border:1px solid #cfd6e1;border-radius:8px;padding:9px 10px;background:#fff;outline:none}input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(40,86,216,.11)}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.filters input{grid-column:1/-1;width:100%}.filters select{width:100%}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.summary div{background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:9px;text-align:center}.summary strong{display:block;font-size:18px}
.carrier-list{display:grid;gap:9px}.carrier-card{border:1px solid var(--line);border-radius:11px;padding:12px;background:#fff;cursor:pointer}.carrier-card.active{border-color:var(--primary);background:var(--soft)}.carrier-card.overdue{border-left:4px solid var(--danger)}.carrier-card h3{margin:0 0 5px;font-size:15px}.progress{height:8px;background:#e8ebf1;border-radius:99px;overflow:hidden;margin-top:8px}.progress>div{height:100%;background:var(--primary)}
.panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}.empty{padding:55px 20px;text-align:center;color:var(--muted)}.project-head{display:grid;grid-template-columns:1fr auto;gap:14px;margin-bottom:16px}.project-title h1{margin:0 0 6px}.meta{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:10px;margin-top:14px}.meta label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}.meta input,.meta select{width:100%}
.approvals{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.approval{border:1px solid var(--line);border-radius:10px;padding:11px}.approval strong{font-size:13px}.approval .approved{color:var(--ok);font-size:12px;margin:5px 0}
.category{background:#fff;border:1px solid var(--line);border-radius:13px;margin-bottom:13px;overflow:hidden}.cat-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#fafbfe;cursor:pointer;border-bottom:1px solid var(--line)}.cat-head h3{margin:0;font-size:16px}.cat-body.collapsed{display:none}
table{width:100%;border-collapse:collapse;table-layout:fixed}th,td{border-bottom:1px solid #e8ebf0;padding:8px;vertical-align:top}th{background:#f5f7fa;font-size:12px;color:#566070}td textarea{width:100%;min-height:54px;resize:vertical}td input,td select{width:100%}.check{text-align:center}.check input{width:18px;height:18px}.audit{font-size:11px;color:var(--muted);margin-top:5px}.required{color:var(--danger);font-size:11px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.38);display:grid;place-items:center;padding:20px;z-index:50}.modal{width:min(760px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:16px;padding:22px}.modal h2{margin-top:0}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-grid label{font-size:12px;color:var(--muted)}.form-grid input,.form-grid select{width:100%;margin-top:5px}
.template-list{display:grid;gap:8px;margin-top:14px}.template-row{display:grid;grid-template-columns:1.2fr 1.4fr 90px 90px auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:10px;padding:8px}.template-row input,.template-row select{width:100%}
@media(max-width:1000px){.layout{grid-template-columns:1fr}.sidebar{border-right:0;border-bottom:1px solid var(--line)}.meta{grid-template-columns:1fr 1fr}.approvals{grid-template-columns:1fr 1fr}.main{padding:12px}}
</style>
</head>
<body>
<div id="loginView" class="login"><div class="login-card"><div style="font-size:42px">📦</div><h1>Carrier Setup</h1><p class="muted">OPS 배송사 셋업 공동 관리</p><button id="loginBtn" class="google-btn">Google 계정으로 로그인</button><p id="loginMsg" class="small"></p></div></div>
<div id="appView" class="hidden">
<header class="topbar"><div class="brand">📦 Carrier Setup V3</div><div class="user"><span id="saveState" class="save"></span><button id="templateBtn" class="ghost hidden">템플릿 관리</button><img id="userPhoto"><span id="userName"></span><button id="logoutBtn" class="ghost">로그아웃</button></div></header>
<div class="layout">
<aside class="sidebar">
<div class="row space"><strong>배송사 프로젝트</strong><button id="newCarrierBtn" class="primary">+ 추가</button></div>
<div id="summary" class="summary"></div>
<div class="filters">
<input id="searchInput" placeholder="배송사·서비스 검색">
<select id="statusFilter"><option value="">전체 상태</option><option>정보 수집</option><option>개발</option><option>테스트</option><option>운영 준비</option><option>완료</option></select>
<select id="ownerFilter"><option value="">전체 담당자</option></select>
<select id="countryFilter"><option value="">전체 도착국</option></select>
<select id="delayFilter"><option value="">전체 일정</option><option value="overdue">지연만</option></select>
</div>
<div id="carrierList" class="carrier-list"></div>
</aside>
<main class="main">
<div id="emptyView" class="panel empty">왼쪽에서 배송사를 선택하거나 신규 프로젝트를 추가하세요.</div>
<div id="detailView" class="hidden">
<div class="project-head"><div class="project-title"><h1 id="detailTitle"></h1><div id="detailSub" class="muted"></div></div><div class="row"><button id="archiveBtn" class="ghost">완료/보관</button><button id="deleteCarrierBtn" class="danger">완전 삭제</button></div></div>
<div class="panel" style="margin-bottom:16px">
<div class="row space"><strong>전체 진행률</strong><strong id="detailProgressText"></strong></div><div class="progress"><div id="detailProgressBar"></div></div>
<div class="meta">
<div><label>배송사명</label><input data-carrier-field="name"></div><div><label>프로젝트명</label><input data-carrier-field="projectName"></div><div><label>프로젝트 유형</label><select data-carrier-field="templateType"><option value="newCarrier">신규 배송사 셋업</option><option value="development">기존 배송사 추가 개발</option><option value="policyChange">도착국 정책 변경 및 운영 배포</option></select></div><div><label>서비스명</label><input data-carrier-field="serviceName"></div><div><label>출발국</label><input data-carrier-field="origin"></div><div><label>도착국</label><input data-carrier-field="destination"></div>
<div><label>프로젝트 상태</label><select data-carrier-field="projectStatus"><option>정보 수집</option><option>개발</option><option>테스트</option><option>운영 준비</option><option>완료</option></select></div>
<div><label>담당자</label><input data-carrier-field="owner"></div><div><label>오픈 예정일</label><input type="date" data-carrier-field="openDate"></div><div style="grid-column:span 3"><label>OneDrive / 자료 폴더 링크</label><input data-carrier-field="documentUrl" placeholder="https://..."></div>
</div>
<div class="approvals" id="approvals"></div>
</div>
<div id="categories"></div>
</div>
</main></div></div>

<div id="newCarrierModal" class="modal-bg hidden"><div class="modal">
<h2>신규 프로젝트</h2>
<div class="form-grid">
<div><label>프로젝트 유형<select id="newTemplateType"><option value="newCarrier">신규 배송사 셋업</option><option value="development">기존 배송사 추가 개발</option><option value="policyChange">도착국 정책 변경 및 운영 배포</option></select></label></div>
<div><label>배송사명<input id="newName" list="carrierNameOptions" placeholder="기존 배송사 또는 신규 배송사"></label><datalist id="carrierNameOptions"></datalist></div>
<div style="grid-column:1/-1"><label>프로젝트명<input id="newProjectName" placeholder="예: POD API 추가 개발 / 2026년 8월 미국 관세정책 변경"></label></div>
<div><label>서비스명<input id="newService"></label></div><div><label>출발국<input id="newOrigin" placeholder="KR"></label></div>
<div><label>도착국<input id="newDestination" placeholder="US"></label></div><div><label>담당자<input id="newOwner"></label></div>
<div><label>오픈·배포 예정일<input id="newOpenDate" type="date"></label></div>
</div><div class="row" style="justify-content:flex-end;margin-top:18px"><button id="cancelNewBtn" class="ghost">취소</button><button id="createCarrierBtn" class="primary">생성</button></div></div></div>

function subscribeCarriers(){if(unsubCarriers)unsubCarriers();unsubCarriers=onSnapshot(query(collection(db,"carriers"),orderBy("createdAt","desc")),s=>{carriers=s.docs.map(d=>({id:d.id,...d.data()}));renderFilters();renderList();renderSummary();if(cid&&!carriers.some(c=>c.id===cid))clearDetail()})}
function renderSummary(){const all=carriers.length,done=carriers.filter(c=>c.projectStatus==="완료").length,late=carriers.filter(overdue).length,avg=all?Math.round(carriers.reduce((a,c)=>a+progress(c),0)/all):0;$("#summary").innerHTML=`<div><strong>${all}</strong><span class="small">전체</span></div><div><strong>${done}</strong><span class="small">완료</span></div><div><strong>${late}</strong><span class="small">지연</span></div><div><strong>${avg}%</strong><span class="small">평균</span></div>`}
function renderFilters(){
 const names=[...new Set(carriers.map(c=>c.name).filter(Boolean))].sort();
 $("#carrierNameOptions").innerHTML=names.map(x=>`<option value="${esc(x)}"></option>`).join("");
 const owners=[...new Set(carriers.map(c=>c.owner).filter(Boolean))].sort(),countries=[...new Set(carriers.map(c=>c.destination).filter(Boolean))].sort();const ov=$("#ownerFilter").value,cv=$("#countryFilter").value;$("#ownerFilter").innerHTML='<option value="">전체 담당자</option>'+owners.map(x=>`<option>${esc(x)}</option>`).join("");$("#countryFilter").innerHTML='<option value="">전체 도착국</option>'+countries.map(x=>`<option>${esc(x)}</option>`).join("");$("#ownerFilter").value=ov;$("#countryFilter").value=cv}
function renderList(){const q=$("#searchInput").value.toLowerCase(),st=$("#statusFilter").value,ow=$("#ownerFilter").value,co=$("#countryFilter").value,de=$("#delayFilter").value;const list=carriers.filter(c=>(`${c.name||""} ${c.projectName||""} ${c.serviceName||""}`.toLowerCase().includes(q))&&(!st||c.projectStatus===st)&&(!ow||c.owner===ow)&&(!co||c.destination===co)&&(!de||overdue(c)));$("#carrierList").innerHTML=list.length?list.map(c=>`<div class="carrier-card ${c.id===cid?"active":""} ${overdue(c)?"overdue":""}" data-id="${c.id}"><h3>${esc(c.name||"이름 없음")}</h3><div style="font-weight:700;font-size:13px;margin-bottom:4px">${esc(c.projectName||c.serviceName||"신규 배송사 셋업")}</div><div class="small">${esc(TEMPLATE_LABELS[c.templateType||"newCarrier"])} · ${esc(c.origin||"-")} → ${esc(c.destination||"-")}</div><div class="small">${esc(c.projectStatus||"정보 수집")} · ${esc(c.owner||"담당자 미정")} · ${progress(c)}% ${overdue(c)?"· 지연":""}</div><div class="progress"><div style="width:${progress(c)}%"></div></div></div>`).join(""):'<div class="small" style="padding:20px 4px">조건에 맞는 프로젝트가 없습니다.</div>';$$(".carrier-card").forEach(e=>e.onclick=()=>openCarrier(e.dataset.id))}
["searchInput","statusFilter","ownerFilter","countryFilter","delayFilter"].forEach(id=>$("#"+id).addEventListener(id==="searchInput"?"input":"change",renderList));

function clearDetail(){cid=null;currentCarrier=null;currentItems=[];if(unsubItems)unsubItems();if(unsubCarrier)unsubCarrier();$("#detailView").classList.add("hidden");$("#emptyView").classList.remove("hidden");renderList()}
function openCarrier(id){cid=id;renderList();$("#emptyView").classList.add("hidden");$("#detailView").classList.remove("hidden");if(unsubItems)unsubItems();if(unsubCarrier)unsubCarrier();
 unsubCarrier=onSnapshot(doc(db,"carriers",id),s=>{if(!s.exists())return clearDetail();currentCarrier={id:s.id,...s.data()};$("#detailTitle").textContent=currentCarrier.projectName||currentCarrier.name||"프로젝트";$("#detailSub").textContent=`${currentCarrier.name||"-"} · ${TEMPLATE_LABELS[currentCarrier.templateType||"newCarrier"]} · ${currentCarrier.origin||"-"} → ${currentCarrier.destination||"-"} · ${currentCarrier.projectStatus||""}`;$$("[data-carrier-field]").forEach(e=>{if(document.activeElement!==e)e.value=currentCarrier[e.dataset.carrierField]||""});renderProgress();renderApprovals()});
 unsubItems=onSnapshot(query(collection(db,"carriers",id,"checklistItems"),orderBy("order")),s=>{currentItems=s.docs.map(d=>({id:d.id,...d.data()}));renderItems();renderProgress()})
}
function renderProgress(){const done=currentItems.filter(isDone).length,total=currentItems.length,p=total?Math.round(done/total*100):0;$("#detailProgressText").textContent=`${done} / ${total} 완료 (${p}%)`;$("#detailProgressBar").style.width=p+"%"}
function renderApprovals(){if(!currentCarrier)return;$("#approvals").innerHTML=approvalTypes.map(([k,label])=>{const a=currentCarrier.approvals?.[k];return `<div class="approval"><strong>${label}</strong><div class="approved">${a?`승인: ${esc(a.name||a.email)} · ${fmt(a.at)}`:"미승인"}</div><button class="${a?"ghost":"primary"}" data-approval="${k}">${a?"승인 취소":"승인"}</button></div>`}).join("");$$("[data-approval]").forEach(b=>b.onclick=()=>toggleApproval(b.dataset.approval))}
async function toggleApproval(k){const approvals={...(currentCarrier.approvals||{})};if(approvals[k])delete approvals[k];else approvals[k]={email:me.email,name:me.profile.name||me.displayName||me.email,at:new Date().toISOString()};await updateDoc(doc(db,"carriers",cid),{approvals,updatedAt:serverTimestamp(),updatedBy:me.email})}

function renderItems(){const groups={};currentItems.filter(i=>i.active!==false).forEach(i=>(groups[i.category]??=[]).push(i));$("#categories").innerHTML=Object.entries(groups).map(([cat,arr])=>{const done=arr.filter(isDone).length,p=Math.round(done/arr.length*100);return `<section class="category"><div class="cat-head"><h3>${esc(cat)}</h3><span class="small">${done}/${arr.length} · ${p}%</span></div><div class="cat-body"><table><thead><tr><th style="width:50px">완료</th><th style="width:205px">확인 항목</th><th style="width:125px">상태</th><th>배송사 답변</th><th>내부 적용</th><th style="width:110px">담당자</th><th style="width:125px">확인일</th><th>비고</th></tr></thead><tbody>${arr.map(i=>`<tr data-item="${i.id}"><td class="check"><input type="checkbox" data-f="completed" ${isDone(i)?"checked":""}></td><td><strong>${esc(i.title)}</strong>${i.required!==false?'<span class="required"> 필수</span>':''}${i.lastEditedAt?`<div class="audit">수정: ${esc(i.updatedByName||i.updatedBy||"-")} · ${fmt(i.lastEditedAt)}</div>`:""}</td><td><select data-f="status"><option ${i.status==="미확인"?"selected":""}>미확인</option><option ${i.status==="확인 중"?"selected":""}>확인 중</option><option ${i.status==="완료"?"selected":""}>완료</option><option ${i.status==="해당 없음"?"selected":""}>해당 없음</option></select></td><td><textarea data-f="carrierAnswer">${esc(i.carrierAnswer||"")}</textarea></td><td><textarea data-f="internalNote">${esc(i.internalNote||"")}</textarea></td><td><input data-f="owner" value="${esc(i.owner||"")}"></td><td><input type="date" data-f="confirmedDate" value="${esc(i.confirmedDate||"")}"></td><td><textarea data-f="note">${esc(i.note||"")}</textarea></td></tr>`).join("")}</tbody></table></div></section>`}).join("");$$(".cat-head").forEach(h=>h.onclick=()=>h.nextElementSibling.classList.toggle("collapsed"));$$("[data-item] [data-f]").forEach(e=>e.addEventListener(e.tagName==="TEXTAREA"||e.tagName==="INPUT"&&e.type!=="checkbox"?"input":"change",()=>saveItem(e)))}
async function saveItem(el){const row=el.closest("[data-item]"),id=row.dataset.item,item=currentItems.find(x=>x.id===id),f=el.dataset.f;let v=el.type==="checkbox"?el.checked:el.value;if(f==="completed"){item.completed=v;item.status=v?"완료":"미확인";row.querySelector('[data-f="status"]').value=item.status}else if(f==="status"){item.status=v;item.completed=(v==="완료"||v==="해당 없음");row.querySelector('[data-f="completed"]').checked=item.completed}else item[f]=v;renderProgress();setSave("saving","저장 중...");
 schedule(id+f,async()=>{try{const ref=doc(db,"carriers",cid,"checklistItems",id),expected=item.revision||0;await runTransaction(db,async tx=>{const s=await tx.get(ref),server=s.data()||{};if((server.revision||0)!==expected&&server.updatedBy&&server.updatedBy!==me.email)throw new Error("CONFLICT");const patch={[f]:v,status:item.status,completed:item.completed,revision:(server.revision||0)+1,updatedAt:serverTimestamp(),lastEditedAt:serverTimestamp(),updatedBy:me.email,updatedByName:me.profile.name||me.displayName||me.email};tx.update(ref,patch)});item.revision=expected+1;await syncProgress();setSave("saved","저장 완료")}catch(e){if(e.message==="CONFLICT"){setSave("failed","수정 충돌");if(confirm("다른 사용자가 먼저 수정했습니다. 현재 입력 내용으로 덮어쓸까요?")){await updateDoc(doc(db,"carriers",cid,"checklistItems",id),{[f]:v,status:item.status,completed:item.completed,revision:(item.revision||0)+2,updatedAt:serverTimestamp(),lastEditedAt:serverTimestamp(),updatedBy:me.email,updatedByName:me.profile.name||me.displayName||me.email});await syncProgress();setSave("saved","덮어쓰기 완료")}else setSave("failed","저장 취소")}else{console.error(e);setSave("failed","저장 실패")}}})}
async function syncProgress(){const done=currentItems.filter(isDone).length,total=currentItems.length;await updateDoc(doc(db,"carriers",cid),{completedItems:done,totalItems:total,updatedAt:serverTimestamp(),updatedBy:me.email});const c=carriers.find(x=>x.id===cid);if(c){c.completedItems=done;c.totalItems=total;renderList();renderSummary()}}

$$("[data-carrier-field]").forEach(e=>e.addEventListener("input",()=>{if(!cid)return;const f=e.dataset.carrierField,v=e.value;setSave("saving","저장 중...");schedule("c"+f,async()=>{try{await updateDoc(doc(db,"carriers",cid),{[f]:v,updatedAt:serverTimestamp(),updatedBy:me.email});setSave("saved","저장 완료")}catch{setSave("failed","저장 실패")}})}));
$("#archiveBtn").onclick=async()=>{if(!cid)return;await updateDoc(doc(db,"carriers",cid),{projectStatus:"완료",archived:true,updatedAt:serverTimestamp(),updatedBy:me.email})};
$("#deleteCarrierBtn").onclick=async()=>{if(!cid)return;const name=currentCarrier.name||"";if(prompt(`완전 삭제하려면 배송사명 "${name}"을 입력하세요.`)!==name)return;setSave("saving","삭제 중...");const snap=await getDocs(collection(db,"carriers",cid,"checklistItems"));let batch=writeBatch(db),n=0;for(const d of snap.docs){batch.delete(d.ref);n++;if(n===450){await batch.commit();batch=writeBatch(db);n=0}}if(n)await batch.commit();await deleteDoc(doc(db,"carriers",cid));setSave("saved","삭제 완료");clearDetail()};

$("#newCarrierBtn").onclick=()=>$("#newCarrierModal").classList.remove("hidden");$("#cancelNewBtn").onclick=()=>$("#newCarrierModal").classList.add("hidden");
async function loadTemplate(type="newCarrier"){
 try{
   const s=await getDocs(query(collection(db,"templates",type,"items"),orderBy("order")));
   const saved=s.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.active!==false);
   return saved.length?saved:(TEMPLATE_MAP[type]||DEFAULT_TEMPLATE);
 }catch(error){
   console.warn("저장 템플릿을 불러오지 못해 기본 템플릿을 사용합니다:",error);
   return TEMPLATE_MAP[type]||DEFAULT_TEMPLATE;
 }
}
$("#createCarrierBtn").onclick=async()=>{
 const name=$("#newName").value.trim();
 const templateType=$("#newTemplateType").value;
 const projectName=$("#newProjectName").value.trim();

 if(!name)return alert("배송사명을 입력하세요.");
 if(!projectName)return alert("프로젝트명을 입력하세요.");

 const btn=$("#createCarrierBtn");
 btn.disabled=true;
 btn.textContent="생성 중...";
 setSave("saving","프로젝트 생성 중...");

 try{
   const tpl=await loadTemplate(templateType);

   const ref=await addDoc(collection(db,"carriers"),{
     name,
     projectName,
     templateType,
     serviceName:$("#newService").value.trim(),
     origin:$("#newOrigin").value.trim().toUpperCase(),
     destination:$("#newDestination").value.trim().toUpperCase(),
     owner:$("#newOwner").value.trim(),
     openDate:$("#newOpenDate").value,
     projectStatus:"정보 수집",
     completedItems:0,
     totalItems:tpl.length,
     approvals:{},
     createdAt:serverTimestamp(),
     createdBy:me.email,
     updatedAt:serverTimestamp(),
     updatedBy:me.email
   });

   let b=writeBatch(db),n=0;

   for(const t of tpl){
     b.set(doc(collection(db,"carriers",ref.id,"checklistItems")),{
       category:t.category,
       title:t.title,
       order:Number(t.order??0),
       required:t.required!==false,
       active:true,
       status:"미확인",
       completed:false,
       revision:0,
       carrierAnswer:"",
       internalNote:"",
       owner:"",
       confirmedDate:"",
       note:"",
       createdAt:serverTimestamp()
     });

     n++;
     if(n===450){await b.commit();b=writeBatch(db);n=0}
   }

   if(n)await b.commit();

   ["newName","newProjectName","newService","newOrigin","newDestination","newOwner","newOpenDate"]
     .forEach(id=>$("#"+id).value="");
   $("#newTemplateType").value="newCarrier";

   $("#newCarrierModal").classList.add("hidden");
   setSave("saved","생성 완료");
   openCarrier(ref.id);

 }catch(error){
   console.error("프로젝트 생성 실패:",error);
   setSave("failed","생성 실패");
   alert("프로젝트 생성에 실패했습니다.\n\n오류: "+(error.code||error.message));
 }finally{
   btn.disabled=false;
   btn.textContent="생성";
 }
};

$("#templateBtn").onclick=async()=>{$("#templateModal").classList.remove("hidden");await renderTemplate()};$("#templateTypeSelect").onchange=renderTemplate;$("#closeTemplateBtn").onclick=()=>$("#templateModal").classList.add("hidden");
async function renderTemplate(){const type=$("#templateTypeSelect").value;const s=await getDocs(query(collection(db,"templates",type,"items"),orderBy("order")));templateItems=s.docs.map(d=>({id:d.id,...d.data()}));$("#templateList").innerHTML=templateItems.map(t=>`<div class="template-row" data-tid="${t.id}"><input data-tf="category" value="${esc(t.category)}"><input data-tf="title" value="${esc(t.title)}"><input type="number" data-tf="order" value="${t.order||0}"><select data-tf="required"><option value="true" ${t.required!==false?"selected":""}>필수</option><option value="false" ${t.required===false?"selected":""}>선택</option></select><button class="danger" data-del-t>삭제</button></div>`).join("");$$("[data-tid] [data-tf]").forEach(e=>e.onchange=async()=>{const r=e.closest("[data-tid]");let v=e.value;if(e.dataset.tf==="order")v=Number(v);if(e.dataset.tf==="required")v=v==="true";await updateDoc(doc(db,"templates",$("#templateTypeSelect").value,"items",r.dataset.tid),{[e.dataset.tf]:v,updatedAt:serverTimestamp()})});$$("[data-del-t]").forEach(b=>b.onclick=async()=>{if(confirm("템플릿 항목을 삭제할까요? 기존 프로젝트 항목은 유지됩니다.")){await deleteDoc(doc(db,"templates",$("#templateTypeSelect").value,"items",b.closest("[data-tid]").dataset.tid));renderTemplate()}})}
$("#addTemplateItemBtn").onclick=async()=>{await addDoc(collection(db,"templates",$("#templateTypeSelect").value,"items"),{category:"새 카테고리",title:"새 확인 항목",order:templateItems.length+1,required:true,active:true,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});renderTemplate()};
$("#applyTemplateBtn").onclick=async()=>{if(!confirm("모든 기존 프로젝트에 누락된 템플릿 항목을 추가할까요?"))return;const type=$("#templateTypeSelect").value;const tpl=await loadTemplate(type);for(const c of carriers.filter(x=>(x.templateType||"newCarrier")===type)){const snap=await getDocs(collection(db,"carriers",c.id,"checklistItems")),keys=new Set(snap.docs.map(d=>`${d.data().category}||${d.data().title}`));let b=writeBatch(db),n=0,added=0;for(const t of tpl){if(keys.has(`${t.category}||${t.title}`))continue;b.set(doc(collection(db,"carriers",c.id,"checklistItems")),{category:t.category,title:t.title,order:t.order,required:t.required!==false,active:true,status:"미확인",completed:false,revision:0,carrierAnswer:"",internalNote:"",owner:"",confirmedDate:"",note:"",createdAt:serverTimestamp(),updatedAt:serverTimestamp(),updatedBy:me.email,updatedByName:me.profile.name||me.email});n++;added++;if(n===450){await b.commit();b=writeBatch(db);n=0}}if(n)await b.commit();if(added)await updateDoc(doc(db,"carriers",c.id),{totalItems:snap.size+added,updatedAt:serverTimestamp(),updatedBy:me.email})}alert("기존 프로젝트 적용이 완료되었습니다.")};
</script>
